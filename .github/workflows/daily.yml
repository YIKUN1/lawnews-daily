name: LawNews Daily

on:
  schedule:
    # 早报：每天 23:00 UTC (北京时间 07:00)
    - cron: '0 23 * * *'
    # 晚报：每天 12:00 UTC (北京时间 20:00)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  push-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run morning news
      if: github.event_name == 'schedule' && github.event.schedule == '0 23 * * *' || github.event.inputs.report_type == 'morning'
      env:
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      run: |
        python main.py --now
    
    - name: Run evening news
      if: github.event_name == 'schedule' && github.event.schedule == '0 12 * * *' || github.event.inputs.report_type == 'evening'
      env:
        PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      run: |
        python main.py --evening
